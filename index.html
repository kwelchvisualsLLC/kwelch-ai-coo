<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>KWelch · AI COO</title>
<!-- Phone-app (PWA) setup: lets "Add to Home Screen" launch fullscreen with an icon -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="KWelch COO" />
<meta name="theme-color" content="#0a0a0a" />
<link rel="apple-touch-icon" href="kwcoo-icon-180.png" />
<link rel="manifest" href="kwcoo.webmanifest" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    /* VisualBook palette — black + gold */
    --bg:#0a0a0a;
    --bg2:#0d0d0d;
    --panel:#141414;
    --panel-2:#1c1c1c;
    --border:#2a2a2a;
    --border-2:rgba(201,168,76,0.45);
    --txt:#ffffff;
    --txt-dim:#888888;
    --txt-faint:#5a5a5a;
    --accent:#C9A84C;
    --accent-2:#e0a030;
    --gold:#C9A84C;
    --green:#4caf78;
    --red:#e25555;
    --orange:#e0a030;
    --radius:14px;
    --shadow:0 18px 50px -24px rgba(0,0,0,0.8);
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{margin:0;height:100%;}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(1100px 600px at 10% -12%, rgba(201,168,76,0.07), transparent 55%),
      var(--bg);
    color:var(--txt);
    overflow:hidden;
  }
  ::selection{background:var(--gold);color:#0a0a0a;}
  #root{height:100dvh;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:20px;border:2px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.16);background-clip:padding-box;}

  .app{display:flex;height:100dvh;}
  .glass{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }

  /* sidebar */
  .sidebar{
    width:248px;flex-shrink:0;padding:calc(22px + env(safe-area-inset-top)) 16px 22px;display:flex;flex-direction:column;gap:6px;
    border-right:1px solid var(--border);background:rgba(255,255,255,0.02);backdrop-filter:blur(20px);
  }
  .brand{padding:8px 12px 22px;}
  .wordmark{font-size:19px;font-weight:900;letter-spacing:3px;color:var(--txt);line-height:1;}
  .wordmark span{color:var(--gold);}
  .brand-sub{margin-top:5px;font-size:9px;color:var(--txt-dim);letter-spacing:3px;font-weight:600;}
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:13px;cursor:pointer;
    color:var(--txt-dim);font-size:12.5px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;transition:all .18s ease;border:1px solid transparent;
  }
  .nav-item .ico{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
  .nav-item:hover{background:var(--panel);color:var(--txt);}
  .nav-item.active{background:rgba(201,168,76,0.10);color:var(--gold);border-color:var(--border-2);}
  .nav-badge{margin-left:auto;font-size:11px;background:var(--gold);color:#0a0a0a;border-radius:20px;padding:1px 8px;font-weight:700;}
  .nav-badge.red{background:var(--red);}
  .side-foot{margin-top:auto;}
  .level-card{padding:13px;border-radius:15px;background:var(--panel);border:1px solid var(--border);}
  .level-card .lvl{display:flex;justify-content:space-between;align-items:baseline;gap:10px;font-size:13px;color:var(--txt-dim);}
  .level-card .lvl b{color:var(--gold);font-size:15px;}
  .xpbar{height:7px;border-radius:10px;background:rgba(255,255,255,0.08);margin-top:9px;overflow:hidden;}
  .xpbar i{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--gold),var(--orange));transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .streak{display:flex;align-items:center;gap:7px;margin-top:11px;font-size:12.5px;color:var(--txt-dim);}

  /* main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .topbar{padding:calc(18px + env(safe-area-inset-top)) 30px 14px;display:flex;align-items:center;gap:16px;}
  .greet h2{margin:0;font-size:21px;font-weight:700;letter-spacing:-.3px;}
  .greet p{margin:3px 0 0;font-size:13px;color:var(--txt-dim);}
  .cmd{flex:1;max-width:560px;margin-left:auto;position:relative;}
  .cmd input{
    width:100%;padding:13px 16px 13px 44px;border-radius:10px;border:1px solid var(--border);
    background:var(--panel);color:var(--txt);font-size:14px;outline:none;transition:.2s;
  }
  .cmd input:focus{border-color:var(--accent);background:rgba(201,168,76,0.08);box-shadow:0 0 0 4px rgba(201,168,76,0.12);}
  .cmd input::placeholder{color:var(--txt-faint);}
  .cmd .ai-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:16px;}
  .cmd-hint{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--txt-faint);
    border:1px solid var(--border);border-radius:7px;padding:2px 7px;}
  .content{flex:1;overflow-y:auto;padding:8px 30px 40px;}

  /* generic */
  .row{display:flex;gap:18px;}
  .col{display:flex;flex-direction:column;gap:18px;}
  .card{padding:20px;border-radius:var(--radius);}
  .card-h{display:flex;align-items:center;gap:9px;margin-bottom:15px;}
  .card-h h3{margin:0;font-size:15px;font-weight:650;letter-spacing:-.2px;}
  .card-h .sub{margin-left:auto;font-size:10px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
  .pill{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:var(--panel-2);color:var(--txt-dim);border:1px solid var(--border);}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px;}
  .stat{padding:18px;border-radius:14px;position:relative;overflow:hidden;}
  .stat .lab{font-size:10.5px;color:var(--txt-dim);font-weight:700;text-transform:uppercase;letter-spacing:1.4px;}
  .stat .val{font-size:28px;font-weight:760;letter-spacing:-1px;margin-top:6px;}
  .stat .delta{font-size:10px;margin-top:5px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
  .stat .ring{position:absolute;right:14px;top:14px;}
  .up{color:var(--green);} .down{color:var(--red);}

  .gauge{transform:rotate(-90deg);}
  .gauge circle{fill:none;stroke-width:7;stroke-linecap:round;}
  .gauge .bg{stroke:rgba(255,255,255,0.08);}

  /* task list */
  .tlist{display:flex;flex-direction:column;gap:9px;}
  .task{
    display:flex;align-items:flex-start;gap:13px;padding:13px 14px;border-radius:15px;
    background:var(--panel);border:1px solid var(--border);transition:.16s;cursor:pointer;
  }
  .task:hover{background:var(--panel-2);border-color:var(--border-2);transform:translateY(-1px);}
  .task.done{opacity:.5;}
  .task.done .t-title{text-decoration:line-through;}
  .check{
    width:21px;height:21px;border-radius:7px;border:2px solid var(--border-2);flex-shrink:0;margin-top:1px;
    display:grid;place-items:center;transition:.16s;font-size:12px;color:transparent;
  }
  .task:hover .check{border-color:var(--accent);}
  .check.on{background:linear-gradient(135deg,var(--green),#3f9968);border-color:transparent;color:#06281d;}
  .t-body{flex:1;min-width:0;}
  .t-title{font-size:14px;font-weight:550;line-height:1.35;}
  .t-meta{display:flex;align-items:center;gap:9px;margin-top:6px;flex-wrap:wrap;}
  .chip{font-size:11px;color:var(--txt-dim);display:inline-flex;align-items:center;gap:4px;}
  .chip.cat{background:var(--panel-2);padding:2px 8px;border-radius:20px;border:1px solid var(--border);text-transform:uppercase;letter-spacing:.7px;font-size:9.5px;font-weight:600;}
  .stars{color:var(--gold);font-size:12px;letter-spacing:1px;flex-shrink:0;}
  .stars .off{color:rgba(255,255,255,0.13);}
  .due-soon{color:var(--orange);} .overdue{color:var(--red);font-weight:600;}
  .t-side{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
  .pscore{font-size:11px;color:var(--txt-faint);font-variant-numeric:tabular-nums;}

  .sub-row{margin-left:34px;display:flex;align-items:center;gap:9px;padding:6px 0;font-size:13px;color:var(--txt-dim);}
  .sub-check{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--border-2);display:grid;place-items:center;cursor:pointer;font-size:10px;color:transparent;flex-shrink:0;}
  .sub-check.on{background:var(--green);border-color:transparent;color:#06281d;}
  .sub-row.done span{text-decoration:line-through;opacity:.55;}

  /* suggestion */
  .sugg{display:flex;gap:12px;padding:13px;border-radius:14px;background:linear-gradient(135deg,rgba(201,168,76,0.1),rgba(224,160,48,0.05));border:1px solid var(--border);margin-bottom:9px;}
  .sugg .ic{font-size:18px;}
  .sugg .txt{flex:1;font-size:13px;line-height:1.4;color:var(--txt);}
  .sugg .txt b{color:#fff;}
  .sugg .act{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.7px;text-transform:uppercase;cursor:pointer;white-space:nowrap;align-self:center;padding:6px 11px;border-radius:9px;border:1px solid var(--border);transition:.15s;}
  .sugg .act:hover{background:var(--panel-2);}

  /* planner */
  .timeline{position:relative;padding-left:8px;}
  .tblock{display:flex;gap:15px;padding:4px 0;}
  .tblock .time{width:62px;flex-shrink:0;font-size:12.5px;color:var(--txt-faint);text-align:right;padding-top:13px;font-variant-numeric:tabular-nums;}
  .tblock .bar{width:4px;border-radius:4px;flex-shrink:0;margin:6px 0;}
  .tblock .blk{flex:1;padding:12px 15px;border-radius:13px;background:var(--panel);border:1px solid var(--border);margin-bottom:2px;}
  .tblock .blk .bt{font-size:13.5px;font-weight:550;}
  .tblock .blk .bm{font-size:11.5px;color:var(--txt-faint);margin-top:3px;}

  /* revenue */
  .rev-op{padding:15px;border-radius:15px;background:var(--panel);border:1px solid var(--border);margin-bottom:10px;}
  .rev-op .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .rev-op .name{font-size:14px;font-weight:600;}
  .rev-op .val{font-size:15px;font-weight:700;color:var(--green);white-space:nowrap;}
  .rev-op .desc{font-size:12.5px;color:var(--txt-dim);margin-top:5px;line-height:1.4;}
  .rev-op .foot{display:flex;align-items:center;gap:8px;margin-top:11px;}
  .stage{font-size:9.5px;padding:3px 9px;border-radius:20px;font-weight:700;letter-spacing:1px;}
  .stage.lead{background:rgba(201,168,76,0.18);color:#b9a6ff;}
  .stage.contacted{background:rgba(224,160,48,0.16);color:var(--orange);}
  .stage.proposal{background:rgba(224,160,48,0.15);color:var(--accent-2);}
  .stage.won{background:rgba(76,175,120,0.16);color:var(--green);}
  .mini-btn{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--txt-dim);cursor:pointer;padding:5px 10px;border-radius:8px;border:1px solid var(--border);transition:.15s;}
  .mini-btn:hover{color:#fff;border-color:var(--border-2);background:var(--panel-2);}

  /* coach */
  .coach-card{padding:17px;border-radius:16px;border:1px solid var(--border);margin-bottom:12px;background:var(--panel);}
  .coach-card .lbl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;}
  .coach-card .body{font-size:13.5px;line-height:1.5;color:var(--txt);}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(5,6,12,0.62);backdrop-filter:blur(6px);display:grid;place-items:center;z-index:50;animation:fade .2s;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  .modal{width:560px;max-width:92vw;max-height:88vh;overflow-y:auto;padding:26px;animation:pop .24s cubic-bezier(.2,.8,.2,1);}
  .modal h3{margin:0 0 4px;font-size:19px;}
  .modal .mh-sub{font-size:13px;color:var(--txt-dim);margin-bottom:20px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:10.5px;color:var(--txt-dim);margin-bottom:7px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
  .field input,.field select,.field textarea{
    width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);
    background:var(--panel-2);color:var(--txt);font-size:14px;outline:none;font-family:inherit;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .slider-val{float:right;color:var(--accent-2);font-weight:700;}
  input[type=range]{accent-color:var(--accent);}
  .live-score{display:flex;align-items:center;gap:14px;padding:14px;border-radius:14px;background:linear-gradient(135deg,rgba(201,168,76,0.14),rgba(224,160,48,0.06));border:1px solid var(--border);margin:6px 0 20px;}
  .live-score .big{font-size:30px;font-weight:780;letter-spacing:-1px;}
  .live-score .ld{flex:1;}
  .live-score .ld .s1{font-size:13px;font-weight:600;}
  .live-score .ld .s2{font-size:12px;color:var(--txt-dim);margin-top:2px;}
  .btn{padding:11px 18px;border-radius:10px;border:1px solid var(--border-2);background:var(--panel-2);color:var(--txt);font-size:13.5px;font-weight:700;letter-spacing:.3px;cursor:pointer;transition:.16s;}
  .btn:hover{background:#242424;border-color:var(--gold);}
  .btn.primary{background:var(--gold);border-color:transparent;color:#0a0a0a;}
  .btn.primary:hover{background:var(--orange);filter:none;}
  .btn.danger{color:var(--red);border-color:rgba(226,85,85,0.3);background:rgba(226,85,85,0.08);}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;}
  .modal-foot .left{margin-right:auto;}

  /* toast */
  .toast-wrap{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:10px;align-items:center;}
  .toast{padding:13px 20px;border-radius:14px;background:#141414;border:1px solid var(--border-2);
    font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:10px;animation:pop .3s;box-shadow:var(--shadow);white-space:nowrap;}
  .toast .xp{color:var(--gold);}

  .empty{text-align:center;padding:50px 20px;color:var(--txt-faint);}
  .empty .e-ico{font-size:38px;opacity:.5;margin-bottom:12px;}
  .seg{display:flex;gap:4px;padding:4px;border-radius:13px;background:var(--panel);border:1px solid var(--border);width:fit-content;margin-bottom:18px;}
  .seg button{padding:7px 15px;border-radius:9px;border:none;background:transparent;color:var(--txt-dim);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:.15s;}
  .seg button.active{background:var(--panel-2);color:#fff;}
  .add-btn{padding:9px 15px;border-radius:10px;background:var(--gold);color:#0a0a0a;font-size:13px;font-weight:700;letter-spacing:.3px;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:.15s;}
  .add-btn:hover{background:var(--orange);}
  .add-btn:hover{filter:brightness(1.08);}
  .health-bd{display:flex;flex-direction:column;gap:11px;}
  .hb-row{display:flex;align-items:center;gap:11px;}
  .hb-row .hl{font-size:10px;color:var(--txt-dim);width:130px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
  .hb-bar{flex:1;height:8px;border-radius:8px;background:rgba(255,255,255,0.07);overflow:hidden;}
  .hb-bar i{display:block;height:100%;border-radius:8px;}
  .hb-row .hv{font-size:12px;color:var(--txt);width:34px;text-align:right;font-variant-numeric:tabular-nums;}
  .section-title{font-size:13px;font-weight:700;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.6px;margin:6px 2px 12px;}

  /* edits board */
  .typebar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .type-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:11px;background:var(--panel);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--txt-dim);cursor:pointer;transition:.15s;}
  .type-pill:hover{border-color:var(--border-2);color:var(--txt);}
  .type-pill.active{background:rgba(201,168,76,0.12);border-color:var(--border-2);color:#fff;}
  .type-pill .n{font-variant-numeric:tabular-nums;font-weight:800;color:var(--gold);}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start;}
  .bcol{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:15px;padding:13px;min-height:90px;}
  .bcol-h{display:flex;align-items:center;gap:8px;margin-bottom:11px;font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt-dim);}
  .bcol-h .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .bcol-h .cnt{margin-left:auto;font-size:11px;background:var(--panel-2);border:1px solid var(--border);border-radius:20px;padding:1px 8px;color:var(--txt-dim);font-weight:700;}
  .ecard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:9px;transition:.15s;}
  .ecard:hover{border-color:var(--border-2);}
  .ecard .et{font-size:13.5px;font-weight:600;line-height:1.35;}
  .ecard .em{display:flex;align-items:center;gap:7px;margin-top:8px;flex-wrap:wrap;}
  .type-tag{font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;}
  .ecard .ef{display:flex;align-items:center;gap:6px;margin-top:11px;}
  .stepbtn{font-size:15px;line-height:1;color:var(--txt-dim);cursor:pointer;padding:4px 8px;border-radius:8px;border:1px solid var(--border);background:var(--panel-2);transition:.15s;user-select:none;}
  .stepbtn:hover{color:#fff;border-color:var(--border-2);}
  .stepbtn.go:hover{color:var(--green);}
  .stepbtn.x{margin-left:auto;}
  .stepbtn.x:hover{color:var(--red);}

  /* ===== upgraded editing + task layouts ===== */
  .estrip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
  .estat{padding:13px 15px;border-radius:14px;background:var(--panel);border:1px solid var(--border);position:relative;overflow:hidden;}
  .estat .l{font-size:9.5px;color:var(--txt-dim);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;}
  .estat .v{font-size:23px;font-weight:760;letter-spacing:-.5px;margin-top:5px;font-variant-numeric:tabular-nums;}
  .estat .sub2{font-size:10px;color:var(--txt-faint);margin-top:3px;text-transform:uppercase;letter-spacing:.7px;font-weight:600;}
  .estat.warn .v{color:var(--red);} .estat.good .v{color:var(--green);} .estat.gold .v{color:var(--gold);}
  .estat .edge{position:absolute;left:0;top:0;bottom:0;width:3px;}

  .elist{display:flex;flex-direction:column;gap:10px;}
  .ecard2{display:flex;border-radius:15px;overflow:hidden;background:var(--panel);border:1px solid var(--border);transition:.16s;}
  .ecard2:hover{border-color:var(--border-2);transform:translateY(-1px);}
  .ecard2 .stripe{width:4px;flex-shrink:0;}
  .ecard2 .ebody{flex:1;min-width:0;padding:13px 16px;}
  .ecard2 .etop{display:flex;align-items:flex-start;gap:10px;}
  .ecard2 .etitle{font-size:14.5px;font-weight:600;line-height:1.35;flex:1;min-width:0;}
  .ecard2 .enote{font-size:11.5px;color:var(--txt-faint);margin-top:4px;line-height:1.4;}
  .ecard2 .emeta{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .stage-badge{font-size:9.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .eprog{display:flex;align-items:center;gap:5px;margin-top:11px;}

// Smart task expansion templates
const TEMPLATES = {

// Natural language date parsing
const WEEKDAYS=["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
function parseDate(text){
  const t=text.toLowerCase();
  const now=new Date(); now.setHours(0,0,0,0);
  const mk=(d)=>{const x=new Date(now);x.setDate(x.getDate()+d);return x;};
  let m;
  if(/\btoday|tonight\b/.test(t)) return {date:mk(0),m:t.match(/today|tonight/)[0]};
  if(/\btomorrow\b/.test(t)) return {date:mk(1),m:"tomorrow"};
  if((m=t.match(/in (\d+) days?/))) return {date:mk(parseInt(m[1])),m:m[0]};
  if(/this weekend/.test(t)){ const dow=now.getDay(); return {date:mk((6-dow+7)%7||6),m:"this weekend"}; }
  if(/end of (the )?week/.test(t)){ const dow=now.getDay(); return {date:mk((5-dow+7)%7||5),m:"end of week"}; }
  for(let i=0;i<7;i++){
    const re=new RegExp("(before |by |on |next |this )?"+WEEKDAYS[i]);
    if((m=t.match(re))){
      const dow=now.getDay(); let diff=(i-dow+7)%7;
      if(diff===0) diff=7;
      if(/next /.test(m[0])) diff+= (diff<=7?0:0); // next keeps next occurrence
      return {date:mk(diff),m:m[0].trim()};
    }
  }
  return null;
}
function parseRevenue(text){ const m=text.replace(/,/g,"").match(/\$\s?(\d+(\.\d+)?)\s?k?/i); if(!m) return 0; let v=parseFloat(m[1]); if(/k/i.test(m[0])) v*=1000; return Math.round(v); }

function parseNaturalLanguage(raw){
  let title=raw.trim();
  const d=parseDate(raw);
  const rev=parseRevenue(raw);
  const cat=categorize(raw);
  let deadline=null;
  if(d){ deadline=d.date.toISOString().slice(0,10);
    title=title.replace(new RegExp("\\b(before |by |on |next |this )?"+d.m+"\\b","i"),"").replace(/\s+/g," ").trim();
  }
  if(rev) title=title.replace(/\$\s?\d[\d,]*(\.\d+)?\s?k?/i,"").replace(/\s+/g," ").trim();
  title=title.replace(/^(remind me to|i need to|please|can you|todo:?)\s+/i,"");
  title=title.charAt(0).toUpperCase()+title.slice(1);
  return {title, deadline, revenue:rev, category:cat};
}

// THE PRIORITY FORMULA
function daysUntil(deadline){ if(!deadline) return null;
  const a=new Date(deadline); a.setHours(0,0,0,0);
  const b=new Date(); b.setHours(0,0,0,0);
  return Math.round((a-b)/86400000);
}
function priorityScore(task){
  // weights
  const W={deadline:34, revenue:26, client:16, growth:10, stress:8, time:6};
  const du=daysUntil(task.deadline);
  let urgency;
  if(du===null) urgency=0.18;
  else if(du<0) urgency=1.0;
  else if(du===0) urgency=0.95;
  else if(du===1) urgency=0.82;
  else if(du<=3) urgency=0.62;
  else if(du<=7) urgency=0.42;
  else if(du<=14) urgency=0.28;
  else urgency=0.16;
  const revN=Math.min(1,(task.revenue||0)/3000);
  const client=(task.clientImportance||3)/5;
  const growth=(task.growth||2)/5;
  const stress=(task.stress||2)/5;
  const timePen=Math.min(1,(task.estHours||1)/8);
  let s = W.deadline*urgency + W.revenue*revN + W.client*client + W.growth*growth + W.stress*stress - W.time*timePen;
  s=Math.max(0,Math.min(100,Math.round(s)));
  return s;
}
function scoreToStars(s){ if(s>=78)return 5; if(s>=60)return 4; if(s>=42)return 3; if(s>=24)return 2; return 1; }
const STAR_LABEL={5:"Critical",4:"High",3:"Medium",2:"Low",1:"Someday"};

// Daily planner builder
function buildPlanner(tasks){
  const today=tasks.filter(t=>!t.done && (daysUntil(t.deadline)!==null && daysUntil(t.deadline)<=1 || priorityScore(t)>=55))
    .sort((a,b)=>priorityScore(b)-priorityScore(a)).slice(0,7);
  const blocks=[]; let cur=9*60; let lunched=false;
  const DAY_END=19*60; // wind down by 7pm
  const push=(title,mins,meta,color)=>{ blocks.push({time:cur,mins,title,meta,color}); cur+=mins; };
  push("Morning reset · gym + coffee",90,"Energy first — your best edits happen after","#34e0a1");
  let overflow=0;
  for(const t of today){
    if(!lunched && cur>=12*60){ push("Lunch break",45,"Step away from the screen","#ff9f43"); lunched=true; }
    const mins=Math.max(30,Math.round((t.estHours||1)*60));
    if(cur+mins>DAY_END){ overflow++; continue; } // day is full — rolls to tomorrow
    const c=CATEGORIES[t.category];
    push(t.title, mins, `${c.emoji} ${c.label} · ~${t.estHours||1}h`, "#7c5cff");
    cur+=10; // buffer
  }
  if(!lunched){ push("Lunch break",45,"Step away from the screen","#ff9f43"); }
  if(cur<=18*60) push("Post today's reel + check DMs",30,"Consistency compounds — don't skip","#22d3ee");
  if(cur<=19*60) push("Invoices & inbox zero",30,"Close the financial loop daily","#ffcf5c");
  if(overflow>0) push(`${overflow} more task${overflow>1?"s":""} → rolled to tomorrow`,0,"Your COO protected your day from overload","#646a80");
  return blocks;
}
function fmtTime(min){ let h=Math.floor(min/60)%24, m=min%60; const ap=h>=12?"PM":"AM"; h=h%12||12; return `${h}:${m.toString().padStart(2,"0")} ${ap}`; }

// AI suggestion engine — data driven
function generateSuggestions(tasks, state){
  const out=[];
  const open=tasks.filter(t=>!t.done);
  const overdue=open.filter(t=>{const d=daysUntil(t.deadline);return d!==null&&d<0;});
  overdue.slice(0,2).forEach(t=>out.push({ic:"🚨",txt:`<b>${t.title}</b> is overdue. ${t.category==="revenue"?"Money on the table — chase it today.":"Knock it out or reschedule before it snowballs."}`,act:"Open",tid:t.id}));

  // posting recency

  // revenue progress
  const revToday=open.filter(t=>t.category==="revenue").reduce((s,t)=>s+(t.revenue||0),0);
  if(revToday < state.dailyGoal) out.push({ic:"💰",txt:`Pipeline today is <b>$${revToday.toLocaleString()}</b> vs your $${state.dailyGoal.toLocaleString()} goal. Pitch 2 local restaurants or upsell a past client.`,act:"Revenue",nav:"revenue"});
  // maintenance nudges (rotating)
  const maint=["Back up this week's SD cards to two drives","Clean your camera sensor & lenses","Check for lens & camera firmware updates","Update your portfolio with a recent shoot","Email 3 school districts about storytelling retainer"];
  out.push({ic:"🧠",txt:maint[new Date().getDate()%maint.length]+".",act:"Add task",add:maint[new Date().getDate()%maint.length]});
  // someday / growth
  if(open.filter(t=>t.category==="product").length===0) out.push({ic:"🛍️",txt:`No <b>digital product</b> tasks active. Your 170K audience is a build-once-sell-forever asset — relaunch the LUT pack.`,act:"Add task",add:"Launch Signature LUT Pack on Gumroad"});
  return out.slice(0,5);
}

const DEFAULT_STATE={dailyGoal:500, monthlyGoal:30000, level:1, xp:0, xpMax:300, streak:0, lastPostDate:null};

function load(key,fallback){ try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch{return fallback;} }

// Bookings created in VisualBook (same origin) drop entries in "kw_edit_inbox".
// Drain them into the Edits board, deduped by bookingId, then clear the inbox.
function drainEditInbox(setEdits){
  let inbox=[];
  try{ inbox=JSON.parse(localStorage.getItem("kw_edit_inbox")||"[]"); }catch{ inbox=[]; }
  if(!Array.isArray(inbox)||!inbox.length) return;
  setEdits(prev=>{
    const have=new Set(prev.map(e=>e.bookingId).filter(Boolean));
    const add=inbox
      .filter(x=>x&&x.bookingId&&!have.has(x.bookingId))
      .map(x=>({id:x.id||("vb"+x.bookingId), title:x.title||"New shoot edit", type:x.type||"other",
                stage:x.stage||"queued", deadline:x.deadline||null, note:x.note||"",
                bookingId:x.bookingId, created:x.created||Date.now()}));

// Paste any text ("Sarah wedding at Vine & Barrel june 5 $1500, $500 deposit,
// 707-555-1042, sarah@x.com") → prefilled booking fields. All editable after.
function parseSmartBooking(text){
  const t=" "+String(text||"").trim()+" ", out={};
  const em=t.match(/[\w.+-]+@[\w-]+\.[\w.]{2,}/); if(em) out.email=em[0];
  const ph=t.match(/(\+?1[\s.-]?)?\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}/); if(ph) out.phone=ph[0].trim();
  const ig=t.match(/(?:^|[\s(])@([A-Za-z0-9_.]{2,30})/); if(ig) out.instagram="@"+ig[1];
  const prices=[...t.matchAll(/\$\s?([\d,]+(?:\.\d{1,2})?)/g)].map(m=>Number(m[1].replace(/,/g,""))).filter(n=>n>0);
  if(prices.length){ out.totalPrice=Math.max(...prices);
    if(prices.length>1){ out.depositAmount=Math.min(...prices); out.depositStatus="partial"; } }
  if(/paid in full|fully paid/i.test(t)) out.depositStatus="yes";
  else if(/no deposit|nothing paid|unpaid/i.test(t)) out.depositStatus="no";
  const iso=t.match(/\d{4}-\d{2}-\d{2}/);
  const md=t.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+(\d{1,2})(?:,?\s*(\d{4}))?/i);
  if(iso) out.date=iso[0];
  else if(md){ const y=md[3]||String(new Date().getFullYear()); const d=new Date(`${md[1]} ${md[2]}, ${y}`);
    if(!isNaN(d)){ if(!md[3]&&d<new Date()) d.setFullYear(d.getFullYear()+1); out.date=d.toISOString().slice(0,10); } }
  const tm=t.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
  if(tm){ let h=Number(tm[1])%12; if(/pm/i.test(tm[3])) h+=12; out.startTime=String(h).padStart(2,"0")+":"+(tm[2]||"00"); }
  const hrs=t.match(/(\d+(?:\.\d+)?)\s*(?:hours?|hrs?)\b/i);
  if(hrs) out.hours=Number(hrs[1]);
  if(out.startTime&&out.hours>0){ const [H,M]=out.startTime.split(":").map(Number); const tot=(H*60+M+Math.round(out.hours*60))%1440; out.endTime=String(Math.floor(tot/60)).padStart(2,"0")+":"+String(tot%60).padStart(2,"0"); }
  const st=SHOOT_TYPES.find(s=>t.toLowerCase().includes(s.toLowerCase().split(/[\/ ]/)[0]));
  if(st) out.shootType=st; else if(/school|district/i.test(t)) out.shootType="School/District";
  if(out.shootType) out.deliverables=deliverablesFor(out.shootType);
  const nm=t.match(/(?:for|with|client[:\s])\s*([A-Z][A-Za-z'&.-]*(?:\s+(?:and|&|of|the)\s+[A-Z][A-Za-z'&.-]*|\s+[A-Z][A-Za-z'&.-]*){0,4})/);
  if(nm) out.clientName=nm[1].trim();
  else { const cap=t.match(/\b([A-Z][a-z]+\s+[A-Z][a-z]+)\b/); if(cap) out.clientName=cap[1]; }
  const loc=t.match(/\b(?:at|in)\s+([A-Z][A-Za-z0-9'&. -]{3,40}?)(?=[,.;]|\s+on\s|\s+\$|\s*$)/);
  if(loc&&loc[1].trim()!==out.clientName) out.location=loc[1].trim();
  return out;
}

// Union two record arrays by stable id (id / bookingId / clientId). On a clash,
// keep the newer copy (by updatedAt/createdAt). Never drops a record, so two
// devices adding different bookings offline both survive — no overwrite, no loss.
function mergeById(a,b){
  const keyOf=x=> x ? (x.id ?? x.bookingId ?? x.clientId ?? null) : null;
  const ts=x=> Number((x&&(x.updatedAt||x.createdAt||x.created))||0);
  const map=new Map(), extra=[], seen=new Set();
  const put=x=>{ const k=keyOf(x);
    if(k===null||k===undefined){ const s=JSON.stringify(x); if(!seen.has(s)){seen.add(s);extra.push(x);} return; }
    const ex=map.get(k); if(!ex||ts(x)>=ts(ex)) map.set(k,x); };
  (a||[]).forEach(put); (b||[]).forEach(put);
  return [...map.values(), ...extra];
}

// Only bookings created on/after go-live auto-populate the Edit queue, so your
// historical shoots don't flood it. Bump this date later to backfill older ones.
const EDIT_SYNC_SINCE = new Date("2026-07-13T00:00:00-07:00").getTime();
function bookingCreatedAt(b){ const c=Number(b.createdAt||b.created); return isNaN(c)?0:c; }
// FRESH START: only bookings created on/after the cutoff are shown & synced, so old
// history drops off cleanly and new bookings (created today+) persist via union-merge.
function freshBookings(arr){ return Array.isArray(arr)?arr:[]; } // show ALL bookings — Keith wants full history visible (2026-07-14)
// New bookings each get an edit in the pipeline. Deduped by bookingId + a
// client|date signature. NEVER touches an existing edit's stage — a *paid* booking
// is not a finished edit; it stays in the pipeline until you deliver it.
function syncBookingsToEdits(bookings,setEdits){
  if(!Array.isArray(bookings)||!bookings.length) return;
  setEdits(prev=>{
    const haveIds=new Set(prev.map(e=>e.bookingId).filter(Boolean));
    const sigOf=e=>e.sig||(((e.title||"").split(" — ")[0])+"|"+(e.deadline||"")).toLowerCase();
    const haveSig=new Set(prev.map(sigOf));
    const add=[];
    for(const b of bookings){
      if(bookingCreatedAt(b) < EDIT_SYNC_SINCE) continue;   // skip historical bookings
      const ed=bookingToEdit(b);
      if(haveIds.has(ed.bookingId)||haveSig.has(ed.sig)) continue;
      haveIds.add(ed.bookingId); haveSig.add(ed.sig); add.push(ed); }
    if(!add.length) return prev;
    return [...add, ...prev.filter(x=>!x.sample)];
  });
}

  // overwrite (and thus erase) the cloud copy.
  useEffect(()=>{ if(!cloudReady.current || (!bookings.length && !clients.length)) return;
    const t=setTimeout(()=>cooPushSafe(VB_SYNC_KEY,{b:bookings,c:clients,_vb:true,_ts:Date.now()}),900);
    return ()=>clearTimeout(t); },[bookings,clients]);

  // On open: pull everything from the cloud (source of truth). Seed it the first time.
  useEffect(()=>{
    let cancelled=false;
    const setters={kw_tasks_v2:setTasks,kw_rev_v2:setRevenue,kw_edits_v1:setEdits,kw_calls_v1:setCallbacks,kw_state_v2:setState};
    (async()=>{

        // the cloud, so every device lands on a clean slate the first time it opens this build.
        if(localStorage.getItem("kw_reset_token")!==RESET_TOKEN){
          await cooResetAll();

          setTasks([]); setRevenue([]); setEdits([]); setCallbacks([]); setBookings([]); setClients([]); setState(DEFAULT_STATE);
        }
        const server=await cooPull();
        if(cancelled) return;

        for(const k of ["kw_tasks_v2","kw_rev_v2","kw_calls_v1","kw_state_v2"]){

          else { const loc=load(k,null); if(cooMeaningful(loc)) await cooPush(k,loc); }

        const add = inbox.filter(x=>x&&x.bookingId&&!have.has(x.bookingId)).map(x=>({
          id:x.id||("vb"+x.bookingId), title:x.title||"New shoot edit", type:x.type||"other",
          stage:x.stage||"queued", deadline:x.deadline||null, note:x.note||"", bookingId:x.bookingId, created:x.created||Date.now()}));
        const finalEdits = [...add, ...baseEdits.filter(x=>!x.sample)];
        setEdits(finalEdits);

        await cooPush("kw_edits_v1", finalEdits);
        if(inbox.length) await cooPush("kw_edit_inbox", []);   // inbox consumed
        // ---- VisualBook bookings & clients: union-by-id across every device ----
        // Stored under the accepted kw_edit_inbox key as { b, c, _vb:true }. Union
        // with whatever this device already has, so nothing is ever lost, then push
        // the union back for the other device. Failures are swallowed (never Offline).
        const vbStore=null; // 2026-07-19: ignore cloud bookings permanently (deploy)
        const bkCloud=vbStore&&Array.isArray(vbStore.b)?vbStore.b:[];
        const clCloud=vbStore&&Array.isArray(vbStore.c)?vbStore.c:[];
        const bkMerged=freshBookings(mergeById(load("vb_bookings",[]),bkCloud));   // drop pre-cutoff history
        setBookings(bkMerged); try{ localStorage.setItem("vb_bookings",JSON.stringify(bkMerged)); }catch{}
        const clMerged=mergeById(load("vb_clients",[]),clCloud);
        setClients(clMerged); try{ if(clMerged.length) localStorage.setItem("vb_clients",JSON.stringify(clMerged)); }catch{}
        syncBookingsToEdits(bkMerged,setEdits);   // new bookings from either device flow into Edits
        if(bkMerged.length||clMerged.length) await cooPushSafe(VB_SYNC_KEY,{b:bkMerged,c:clMerged,_vb:true});
        // Quotes + invoices live on VisualBook's own cloud channel — merge them in.
        try{
          const vbRes=await cooTimeout(fetch(VB_API,{headers:{"x-vb-key":COO_KEY}}),70000);
          if(vbRes.ok){ const vb=await vbRes.json();
            if(Array.isArray(vb.quotes)){ const m=qiFresh(mergeById(load("vb_quotes",[]),vb.quotes)); setQuotes(m); try{localStorage.setItem("vb_quotes",JSON.stringify(m));}catch(e){} }
            if(Array.isArray(vb.invoices)){ const m=qiFresh(mergeById(load("vb_invoices",[]),vb.invoices)); setInvoices(m); try{localStorage.setItem("vb_invoices",JSON.stringify(m));}catch(e){} }
          }
        }catch(e){ /* non-fatal */ }
        if(!cancelled){ try{const _cR=await fetch(COO_API,{headers:{'x-api-key':COO_KEY}});const _cP=await _cR.json();const _cE=(_cP||[]).find(p=>p.key===VB_SYNC_KEY);if(_cE){const _cD=JSON.parse(_cE.value||'{}');if(_cD._vb&&_cD._ts&&_cD._ts>(Number(localStorage.getItem('vb_local_ts'))||0)&&(_cD.b||[]).length>0){const _fB=freshBookings(_cD.b);setBookings(_fB);setClients(_cD.c||[]);try{localStorage.setItem('vb_bookings',JSON.stringify(_fB));localStorage.setItem('vb_clients',JSON.stringify(_cD.c||[]));localStorage.setItem('vb_local_ts',String(_cD._ts));}catch(_e){}}}}catch(_e){}cloudReady.current=true; setCloudMsg("✓ Synced"); setTimeout(()=>setCloudMsg(""),1800); }
      }catch{ if(!cancelled) setCloudMsg("Offline — saved on device"); }
    })();
    return ()=>{cancelled=true;};
  },[]);

  // VisualBook is same-origin — read its bookings/clients live and make sure EVERY
  // booking has an edit in the pipeline. Refresh on cross-tab writes, on focus, and
  // on a slow interval (covers same-tab VisualBook edits). Paid ≠ done: sync only
  // ADDS queued edits, it never advances or completes an existing one.
  useEffect(()=>{
    const refresh=()=>{
      const bk=Array.isArray(load("vb_bookings",[]))?load("vb_bookings",[]):[];
      const cl=Array.isArray(load("vb_clients",[]))?load("vb_clients",[]):[];
      // merge (never replace) so a stale local copy can't drop cloud-synced records
      setBookings(prev=>{ const m=freshBookings(mergeById(prev,bk)); try{ localStorage.setItem("vb_bookings",JSON.stringify(m)); }catch{} return m; });
      setClients(prev=>mergeById(prev,cl));
      drainEditInbox(setEdits);
      syncBookingsToEdits(bk, setEdits);
    };
    refresh();
    const onStorage=(e)=>{ if(!e.key||/^(vb_bookings|vb_clients|kw_edit_inbox)$/.test(e.key)) refresh(); };
    const onFocus=()=>refresh();
    window.addEventListener("storage",onStorage);
    window.addEventListener("focus",onFocus);
    const iv=setInterval(refresh,60000);
    return ()=>{ window.removeEventListener("storage",onStorage); window.removeEventListener("focus",onFocus); clearInterval(iv); };
  },[]);

  const toast=(msg,xp)=>{ const id=Math.random(); setToasts(t=>[...t,{id,msg,xp}]); setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2600); };
  const addXp=(n)=>setState(s=>{let xp=s.xp+n,level=s.level,xpMax=s.xpMax; while(xp>=xpMax){xp-=xpMax;level++;xpMax=Math.round(xpMax*1.25);} return {...s,xp,level,xpMax};});

  const openTasks=useMemo(()=>tasks.filter(t=>!t.done),[tasks]);
  const sorted=useMemo(()=>[...tasks].sort((a,b)=>(a.done-b.done)||priorityScore(b)-priorityScore(a)),[tasks]);

  function handleCmd(e){
    if(e.key!=="Enter"||!cmd.trim())return;
    const tpl=expandTemplate(cmd);
    const parsed=parseNaturalLanguage(cmd);
    setPreview({raw:cmd, parsed, tpl});
    setCmd("");
  }
  function commitTask(t){
    const nt={ id:"t"+Date.now(), title:t.title, category:t.category, deadline:t.deadline||null,
      revenue:t.revenue||0, clientImportance:t.clientImportance||3, growth:t.growth||2, stress:t.stress||2,
      estHours:t.estHours||1, done:false, created:Date.now(), subs:(t.subs||[]).map(s=>({t:s,d:false})) };
    setTasks(p=>[nt,...p]); toast("Task added by AI COO", "+5"); addXp(5);
  }
  function toggleTask(id){
    setTasks(p=>p.map(t=>{
      if(t.id!==id)return t;
      const done=!t.done;
      if(done){ const stars=scoreToStars(priorityScore(t)); toast(`✓ ${STAR_LABEL[stars]} task done`, "+"+(stars*8)); addXp(stars*8);
        if(t.category==="social") setState(s=>({...s,lastPostDate:todayISO(0)}));
      }
      return {...t,done};
    }));
  }
  function toggleSub(tid,i){ setTasks(p=>p.map(t=> t.id!==tid?t:{...t,subs:t.subs.map((s,j)=>j===i?{...s,d:!s.d}:s)})); }
  function delTask(id){ setTasks(p=>p.filter(t=>t.id!==id)); setEditing(null); }
  function saveTask(t){ setTasks(p=>p.map(x=>x.id===t.id?t:x)); setEditing(null); toast("Task updated"); }

  function quickAdd(title){ const p=parseNaturalLanguage(title); commitTask({...p}); }

  // EDITS
  function addEdit(e){ if(!e.title.trim())return; setEdits(p=>[{id:"e"+Date.now(),title:e.title.trim(),type:e.type||"other",stage:"queued",deadline:e.deadline||null,note:e.note||"",created:Date.now()},...p.filter(x=>!x.sample)]); toast("Edit added to the queue"); }
  function moveEdit(id,dir){ setEdits(p=>p.map(x=>{ if(x.id!==id)return x; const i=EDIT_STAGES.findIndex(s=>s.k===x.stage); const ni=Math.max(0,Math.min(EDIT_STAGES.length-1,i+dir)); const ns=EDIT_STAGES[ni].k; if(ns==="delivered"&&x.stage!=="delivered"){toast("✓ Edit delivered","+12");addXp(12);} return {...x,stage:ns}; })); }
  function delEdit(id){ setEdits(p=>p.filter(x=>x.id!==id)); }
  // CALL BACKS
  function addCall(c){ if(!c.name.trim())return; setCallbacks(p=>[{id:"c"+Date.now(),name:c.name.trim(),phone:(c.phone||"").trim(),reason:(c.reason||"").trim(),urgent:!!c.urgent,done:false,created:Date.now()},...p.filter(x=>!x.sample)]); toast("Added to call-back list"); }
  function toggleCall(id){ setCallbacks(p=>p.map(x=>{ if(x.id!==id)return x; const done=!x.done; if(done){toast("✓ Called back","+5");addXp(5);} return {...x,done}; })); }
  function delCall(id){ setCallbacks(p=>p.filter(x=>x.id!==id)); }

  // ---- Smart Booking + Clients (full VisualBook parity — this is the one app) ----
  const [bookingModal,setBookingModal]=useState(null);   // {booking,isNew}
  const [clientModal,setClientModal]=useState(null);     // aggregated client row

  // Quotes + Invoices (ported from VisualBook — same vb_* keys and cloud channel)
  const [quotes,setQuotes]=useState(()=>qiFresh(load("vb_quotes",[])));
  const [invoices,setInvoices]=useState(()=>qiFresh(load("vb_invoices",[])));
  const [invoiceView,setInvoiceView]=useState(null);
  useEffect(()=>{ try{ localStorage.setItem("vb_quotes",JSON.stringify(quotes)); }catch(e){}
    const t=setTimeout(()=>vbCloudPush("quotes",quotes),900); return ()=>clearTimeout(t); },[quotes]);
  useEffect(()=>{ try{ localStorage.setItem("vb_invoices",JSON.stringify(invoices)); }catch(e){}
    const t=setTimeout(()=>vbCloudPush("invoices",invoices),900); return ()=>clearTimeout(t); },[invoices]);
  function generateInvoice(b){
    const fresh=invoiceFromBooking(b);
    const existing=invoices.find(i=>i.bookingId===b.id);
    let inv=fresh;
    if(existing){ inv={...fresh,id:existing.id,no:existing.no,createdAt:existing.createdAt}; setInvoices(p=>p.map(i=>i.id===existing.id?inv:i)); }
    else setInvoices(p=>[inv,...p]);
    return inv;
  }
  function upsertClientFromBooking(b,prev){
    let ex=prev.find(c=>c.id===b.clientId);
    if(!ex&&b.clientName) ex=prev.find(c=>(c.name||"").trim().toLowerCase()===b.clientName.trim().toLowerCase());
    if(ex) return prev.map(c=>c.id===ex.id?{...c,email:c.email||b.email,phone:c.phone||b.phone,instagram:c.instagram||b.instagram,city:c.city||b.location}:c);
    return [...prev,{id:b.clientId,name:b.clientName||"Unnamed",email:b.email||"",phone:b.phone||"",instagram:b.instagram||"",website:"",city:b.location||"",notes:[],createdAt:Date.now()}];
  }
  function saveBooking(b){
    if(!(b.clientName||"").trim()){ toast("Add the client's name first"); return; }
    const exists=bookings.some(x=>x.id===b.id);
    const nextB=exists?bookings.map(x=>x.id===b.id?b:x):[b,...bookings];
    setBookings(nextB); try{ localStorage.setItem("vb_bookings",JSON.stringify(nextB));localStorage.setItem('vb_local_ts',String(Date.now()));  }catch(e){}
    setClients(prev=>{ const next=upsertClientFromBooking(b,prev); try{ localStorage.setItem("vb_clients",JSON.stringify(next)); }catch(e){} vbCloudPush("clients",next); return next; });
    if(!exists) syncBookingsToEdits(nextB,setEdits);   // auto-queue the edit, deduped by bookingId
    vbCloudPush("bookings",nextB);
    toast(exists?"Booking updated":"✦ Booking saved — edit queued","+8"); if(!exists) addXp(8);
    setBookingModal(null);
  }
  function deleteBooking(id){
    const nextB=bookings.filter(b=>b.id!==id);
    setBookings(nextB); try{ localStorage.setItem("vb_bookings",JSON.stringify(nextB)); }catch(e){}
    vbCloudPush("bookings",nextB);
    setBookingModal(null); toast("Booking deleted");
  }

  // Clients portal: add/edit clients directly (not only via bookings)
  const [clientForm,setClientForm]=useState(null);   // {client,isNew}
  function saveClient(c){
    if(!(c.name||"").trim()){ toast("Give the client a name first"); return; }
    setClients(prev=>{
      const exists=prev.some(x=>x.id===c.id);
      const next=exists?prev.map(x=>x.id===c.id?c:x):[{...c,createdAt:c.createdAt||Date.now(),notes:c.notes||[]},...prev];
      try{ localStorage.setItem("vb_clients",JSON.stringify(next)); }catch(e){}
      vbCloudPush("clients",next);
      return next;
    });
    setClientForm(null); setClientModal(null); toast("Client saved");
  }
  function deleteClient(id){
    setClients(prev=>{ const next=prev.filter(x=>x.id!==id); try{ localStorage.setItem("vb_clients",JSON.stringify(next)); }catch(e){} vbCloudPush("clients",next); return next; });
    setClientForm(null); setClientModal(null); toast("Client removed");
  }

  const editsOpen=edits.filter(e=>e.stage!=="delivered").length;
  const callsOpen=callbacks.filter(c=>!c.done).length;

  const navItems=[
    {k:"dashboard",label:"Dashboard"},
    {k:"bookings",label:"Bookings",badge:bookings.length},
    {k:"clients",label:"Clients",badge:new Set((bookings||[]).map(b=>b.clientId||b.clientName)).size},
    {k:"quotes",label:"Quotes",badge:quotes.length},
    {k:"invoices",label:"Invoices",badge:invoices.filter(i=>i.status!=="paid").length},
    {k:"tasks",label:"Tasks",badge:openTasks.length},
    {k:"edits",label:"Edits",badge:editsOpen},
    {k:"callbacks",label:"Call Backs",badge:callsOpen},
    {k:"planner",label:"Daily Planner"},
    {k:"revenue",label:"Revenue Mode",badge:revenue.length},
    {k:"coach",label:"Business Coach"},
  ];

  const hour=new Date().getHours();
  const greet=hour<12?"Good morning":hour<18?"Good afternoon":"Good evening";

  return (
    <div className="app">
      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="brand">
          <div className="wordmark">KWELCH<span>COO</span></div>
          <div className="brand-sub">KWELCHVISUALS</div>
        </div>
        {navItems.map(n=>(
          <div key={n.k} className={"nav-item"+(view===n.k?" active":"")} onClick={()=>setView(n.k)}>
            <span className="ico"><Icon d={NAV_ICONS[n.k]} active={view===n.k}/></span><span>{n.label}</span>
            {n.badge?<span className={"nav-badge"+((n.k==="tasks"&&tasks.some(t=>!t.done&&daysUntil(t.deadline)<0))||(n.k==="callbacks"&&callbacks.some(c=>!c.done&&c.urgent))||(n.k==="edits"&&edits.some(e=>e.stage!=="delivered"&&daysUntil(e.deadline)<0))?" red":"")}>{n.badge}</span>:null}
          </div>
        ))}
        <div className="side-foot">
          <div className="level-card">
            <div className="lvl"><span>Business Level</span><b>Lv {state.level}</b></div>
            <div className="xpbar"><i style={{width:(state.xp/state.xpMax*100)+"%"}}></i></div>
            <div className="streak">🔥 <b style={{color:"var(--orange)"}}>{state.streak}-day</b> streak · {state.xp}/{state.xpMax} XP</div>
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div className="main">
        <div className="topbar">
          <div className="greet">
            <h2>{greet}, Keith 👋 {cloudMsg && <span style={{fontSize:11,fontWeight:600,color:cloudMsg.indexOf("Offline")===0?"var(--orange)":"var(--gold)",letterSpacing:0}}>· ☁ {cloudMsg}</span>}</h2>
            <p>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})} · {openTasks.length} open · {openTasks.filter(t=>daysUntil(t.deadline)<0).length} overdue</p>
          </div>
          <div className="cmd">
            <span className="ai-ico">✨</span>
            <input value={cmd} onChange={e=>setCmd(e.target.value)} onKeyDown={handleCmd}
              placeholder={`Tell your COO anything — "Edit John's wedding before Friday"`} />
            <span className="cmd-hint">⏎ AI</span>
          </div>
        </div>

        <div className="content">
          {view==="dashboard" && <Dashboard {...{tasks,sorted,openTasks,revenue,state,toggleTask,setEditing,setView,quickAdd}}/>}
          {view==="bookings" && <Bookings {...{bookings,clients,setView,
            newBooking:()=>setBookingModal({booking:emptyVbBooking(),isNew:true}),
            openBooking:(b)=>setBookingModal({booking:b,isNew:false})}}/>}
          {view==="clients" && <Clients {...{clients,bookings,setView,
            openClient:(row)=>setClientModal(row),
            newClient:()=>setClientForm({client:{id:vbUid(),name:"",email:"",phone:"",instagram:"",website:"",city:"",notes:[],createdAt:Date.now()},isNew:true})}}/>}
          {view==="quotes" && <Quotes {...{quotes,setQuotes}}/>}
          {view==="invoices" && <Invoices {...{invoices,openInvoice:(inv)=>setInvoiceView(inv)}}/>}
          {view==="tasks" && <Tasks {...{sorted,toggleTask,toggleSub,setEditing,quickAdd}}/>}
          {view==="edits" && <Edits {...{edits,addEdit,moveEdit,delEdit,bookings}}/>}
          {view==="callbacks" && <CallBacks {...{callbacks,addCall,toggleCall,delCall}}/>}
          {view==="planner" && <Planner tasks={tasks}/>}
          {view==="revenue" && <Revenue {...{revenue,setRevenue,toast}}/>}
          {view==="coach" && <Coach {...{tasks,state}}/>}
        </div>
      </div>

      {/* PREVIEW MODAL (smart add) */}
      {preview && <PreviewModal preview={preview} onClose={()=>setPreview(null)} onCommit={(t)=>{commitTask(t);setPreview(null);}}/>}
      {editing && <EditModal task={editing} onClose={()=>setEditing(null)} onSave={saveTask} onDelete={delTask}/>}
      {bookingModal && <BookingModal data={bookingModal} clients={clients} bookings={bookings} onClose={()=>setBookingModal(null)} onSave={saveBooking} onDelete={deleteBooking}
        onInvoice={(b)=>{ setBookingModal(null); setInvoiceView(generateInvoice(b)); }}/>}
      {invoiceView && <InvoiceModal inv={invoiceView} onClose={()=>setInvoiceView(null)}/>}
      {clientModal && <ClientModal data={clientModal} onClose={()=>setClientModal(null)}
        onOpenBooking={(b)=>{setClientModal(null); setBookingModal({booking:b,isNew:false});}}
        onBookAnother={(c)=>{setClientModal(null); setBookingModal({booking:{...emptyVbBooking(),clientId:c.id||vbUid(),clientName:c.name||"",email:c.email||"",phone:c.phone||"",instagram:c.ig||""},isNew:true});}}
        onEdit={(c)=>setClientForm({client:{id:c.id||vbUid(),name:c.name||"",email:c.email||"",phone:c.phone||"",instagram:(c.ig||"").replace(/^@?/,""),website:c.website||"",city:c.city||"",notes:c.notes||[],createdAt:c.createdAt||Date.now()},isNew:false})}/>}
      {clientForm && <ClientFormModal data={clientForm} onClose={()=>setClientForm(null)} onSave={saveClient} onDelete={deleteClient}/>}

      <div className="toast-wrap">
        {toasts.map(t=><div key={t.id} className="toast">{t.msg} {t.xp&&<span className="xp">{t.xp} XP</span>}</div>)}
      </div>
    </div>
  );
}

/* ---------- shared bits ---------- */
// VisualBook-style thin line icons
function Icon({d,active,size=21}){ return (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={active?"#C9A84C":"#888888"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    {Array.isArray(d)?d.map((p,i)=><path key={i} d={p}/>):<path d={d}/>}
  </svg>); }
const NAV_ICONS={
  dashboard:"M3 11l9-8 9 8M5 10v10h14V10",
  tasks:["M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2","M9 5a2 2 0 002 2h2a2 2 0 002-2 2 2 0 00-2-2h-2a2 2 0 00-2 2z","M9 14l2 2 4-4"],
  edits:["M6 3a3 3 0 100 6 3 3 0 000-6z","M6 15a3 3 0 100 6 3 3 0 000-6z","M20 4L8.5 15.5M14.5 14.5L20 20M8.5 8.5L11 11"],
  callbacks:"M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.36 1.9.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0122 16.92z",
  planner:"M4 5h16v15H4zM4 9h16M8 3v4M16 3v4",

  bookings:["M4 5h16v15H4zM4 9h16M8 3v4M16 3v4","M9 15l2 2 4-4"],
  clients:["M17 21v-2a4 4 0 00-4-4H7a4 4 0 00-4 4v2","M9 3a4 4 0 100 8 4 4 0 000-8z","M23 21v-2a4 4 0 00-3-3.87","M16 3.13A4 4 0 0116 11"],
  quotes:["M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z","M14 2v6h6","M9 13h6","M9 17h4"],
  invoices:["M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z","M14 2v6h6","M12 10v8","M14.5 12h-3.5a1.25 1.25 0 000 2.5h2a1.25 1.25 0 010 2.5H9.5"],
};
function Stars({n}){ return <span className="stars">{[1,2,3,4,5].map(i=><span key={i} className={i<=n?"":"off"}>★</span>)}</span>; }
function Gauge({val,color,size=46}){
  const r=size/2-4, c=2*Math.PI*r;
  return <svg className="gauge" width={size} height={size}>
    <circle className="bg" cx={size/2} cy={size/2} r={r}/>
    <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeDasharray={c} strokeDashoffset={c*(1-val/100)}/>
  </svg>;
}
function DueChip({deadline}){
  const d=daysUntil(deadline);
  if(deadline===null||d===null) return null;
  let cls="",txt="";
  if(d<0){cls="overdue";txt=`${-d}d overdue`;}
  else if(d===0){cls="due-soon";txt="Today";}
  else if(d===1){cls="due-soon";txt="Tomorrow";}
  else txt=`${d} days`;
  return <span className={"chip "+cls}>🗓️ {txt}</span>;
}
function TaskRow({t,toggleTask,toggleSub,setEditing,showSubs}){
  const s=priorityScore(t), stars=scoreToStars(s);
  const c=CATEGORIES[t.category];
  const [open,setOpen]=useState(false);
  const hasSubs=t.subs&&t.subs.length>0;
  const stripe=t.done?"transparent":stars>=5?"#e0a030":stars>=4?"rgba(201,168,76,0.5)":"transparent";
  return <div>
    <div className={"task"+(t.done?" done":"")} onClick={()=>setEditing(t)} style={{boxShadow:"inset 3px 0 0 "+stripe}}>
      <div className={"check"+(t.done?" on":"")} onClick={e=>{e.stopPropagation();toggleTask(t.id);}}>✓</div>
      <div className="t-body">
        <div className="t-title">{t.title}</div>
        <div className="t-meta">
          <span className="chip cat">{c.emoji} {c.label}</span>
          <DueChip deadline={t.deadline}/>
          {t.revenue>0 && <span className="chip" style={{color:"var(--green)"}}>💵 ${t.revenue.toLocaleString()}</span>}
          {t.estHours && <span className="chip">⏱ {t.estHours}h</span>}
          {hasSubs && <span className="chip" onClick={e=>{e.stopPropagation();setOpen(o=>!o);}} style={{cursor:"pointer",color:"var(--accent-2)"}}>📋 {t.subs.filter(x=>x.d).length}/{t.subs.length} steps {open?"▾":"▸"}</span>}
        </div>
      </div>
      <div className="t-side">
        <Stars n={stars}/>

      </div>
    ))}
  </div>;
}

/* ---------- TASKS ---------- */
function Tasks({sorted,toggleTask,toggleSub,setEditing,quickAdd}){
  const [filter,setFilter]=useState("all");
  const [adding,setAdding]=useState("");
  const filters=[["all","All"],["open","Open"],["critical","Critical"],["revenue","💰 Revenue"],["done","Done"]];
  const list=sorted.filter(t=>{
    if(filter==="open")return !t.done;
    if(filter==="done")return t.done;
    if(filter==="critical")return !t.done&&scoreToStars(priorityScore(t))>=4;
    if(filter==="revenue")return !t.done&&t.category==="revenue";
    return true;
  });
  const openL=sorted.filter(t=>!t.done);
  const overdueL=openL.filter(t=>{const d=daysUntil(t.deadline);return d!==null&&d<0;});
  const pipeline=openL.reduce((a,t)=>a+(t.revenue||0),0);
  const doneL=sorted.filter(t=>t.done);
  const fmtK=n=>n>=1000?"$"+(n/1000).toFixed(n%1000?1:0)+"k":"$"+n;
  return <div>
    <div className="estrip">
      <div className="estat"><span className="edge" style={{background:"var(--gold)"}}></span><div className="l">Open tasks</div><div className="v">{openL.length}</div></div>
      <div className={"estat"+(overdueL.length?" warn":"")}><span className="edge" style={{background:overdueL.length?"var(--red)":"var(--border)"}}></span><div className="l">Overdue</div><div className="v">{overdueL.length}</div></div>
      <div className="estat good"><span className="edge" style={{background:"var(--green)"}}></span><div className="l">In pipeline</div><div className="v">{fmtK(pipeline)}</div></div>
      <div className="estat"><span className="edge" style={{background:"var(--txt-faint)"}}></span><div className="l">Completed</div><div className="v">{doneL.length}</div></div>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4,flexWrap:"wrap"}}>
      <div className="seg">{filters.map(([k,l])=><button key={k} className={filter===k?"active":""} onClick={()=>setFilter(k)}>{l}</button>)}</div>
      <div style={{marginLeft:"auto",display:"flex",gap:8,flex:1,maxWidth:420}}>
        <input style={{flex:1,padding:"9px 13px",borderRadius:11,border:"1px solid var(--border-2)",background:"#1c1c1c",color:"var(--txt)",fontSize:13,outline:"none"}}
          value={adding} onChange={e=>setAdding(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&adding.trim()){quickAdd(adding);setAdding("");}}}
          placeholder="Quick add — type naturally, AI sorts it…"/>
        <button className="add-btn" onClick={()=>{if(adding.trim()){quickAdd(adding);setAdding("");}}}>＋ Add</button>
      </div>
    </div>
    <div className="card glass">
      <div className="tlist">
        {list.length?list.map(t=><TaskRow key={t.id} t={t} toggleTask={toggleTask} toggleSub={toggleSub} setEditing={setEditing} showSubs/>):
          <div className="empty"><div className="e-ico">📭</div>No tasks here.</div>}
      </div>
    </div>
  </div>;
}

/* ---------- EDITS ---------- */
const INP={flex:1,minWidth:150,padding:"11px 13px",borderRadius:10,border:"1px solid var(--border)",background:"var(--panel-2)",color:"var(--txt)",fontSize:13.5,outline:"none",fontFamily:"inherit"};
function Edits({edits,addEdit,moveEdit,delEdit,bookings}){
  const [title,setTitle]=useState("");
  const [type,setType]=useState("wedding");
  const [deadline,setDeadline]=useState("");
  const [filter,setFilter]=useState("all");   // stage filter: all|queued|editing|review|delivered
  const [typeF,setTypeF]=useState("all");      // type filter
  const [vmode,setVmode]=useState("list");     // list | board
  const bkById={}; (bookings||[]).forEach(b=>{ bkById[bookingKey(b)]=b; });   // link edits back to their booking

  const active=edits.filter(e=>e.stage!=="delivered");
  const stageCount=k=>edits.filter(e=>e.stage===k).length;
  const counts={}; EDIT_TYPE_KEYS.forEach(k=>counts[k]=active.filter(e=>e.type===k).length);
  const overdue=active.filter(e=>{const d=daysUntil(e.deadline);return d!==null&&d<0;})
                      .sort((a,b)=>(daysUntil(a.deadline)??0)-(daysUntil(b.deadline)??0));
  const inProg=edits.filter(e=>e.stage==="editing"||e.stage==="review").length;
  const deliveredCt=stageCount("delivered");

  // filter by stage + type, then auto-rank (overdue first, then soonest)
  const shown=edits.filter(e=>(filter==="all"||e.stage===filter)&&(typeF==="all"||e.type===typeF));
  const rank=e=>{ const d=daysUntil(e.deadline);
    const od=(d!==null&&d<0)?1000-d:0; const soon=(d!==null&&d>=0)?(100-Math.min(d,99)):0;
    return (e.stage==="delivered"?-5000:0)+od+soon; };
  const ranked=[...shown].sort((a,b)=>rank(b)-rank(a));
  const submit=()=>{ if(!title.trim())return; addEdit({title,type,deadline}); setTitle("");setDeadline(""); };
  const stageFilters=[["all","All"],...EDIT_STAGES.map(s=>[s.k,s.label])];

  return <div>
    {/* at-a-glance backlog stats */}
    <div className="estrip">
      <div className="estat"><span className="edge" style={{background:"#888"}}></span><div className="l">In Queue</div><div className="v">{stageCount("queued")}</div></div>
      <div className="estat gold"><span className="edge" style={{background:"var(--gold)"}}></span><div className="l">In Progress</div><div className="v">{inProg}</div></div>
      <div className={"estat"+(overdue.length?" warn":"")}><span className="edge" style={{background:overdue.length?"var(--red)":"var(--border)"}}></span><div className="l">Overdue</div><div className="v">{overdue.length}</div></div>
      <div className="estat good"><span className="edge" style={{background:"var(--green)"}}></span><div className="l">Delivered</div><div className="v">{deliveredCt}</div></div>
    </div>

    {/* overdue nudges — same voice as the dashboard AI Suggestions */}
    {overdue.slice(0,2).map(e=>{
      const d=-daysUntil(e.deadline);
      return <div key={e.id} className="sugg">
        <span className="ic">🚨</span>
        <span className="txt"><b>{e.title}</b> is {d}d overdue. Deliver it or reschedule before it snowballs.</span>
        <span className="act" onClick={()=>moveEdit(e.id,1)}>Advance</span>
      </div>;
    })}

    {/* quick add */}
    <div className="card glass" style={{marginBottom:16}}>
      <div className="card-h"><h3>✂️ Add an edit to the queue</h3><span className="sub">categorize it · then move it down the pipeline</span></div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <input style={{...INP,flex:"1 1 220px"}} placeholder="What needs editing? (e.g. Smith wedding film)" value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")submit();}}/>
        <select style={{...INP,flex:"0 0 180px"}} value={type} onChange={e=>setType(e.target.value)}>
          {EDIT_TYPE_KEYS.map(k=><option key={k} value={k}>{EDIT_TYPES[k].emoji} {EDIT_TYPES[k].label}</option>)}
        </select>
        <input type="date" style={{...INP,flex:"0 0 150px"}} value={deadline} onChange={e=>setDeadline(e.target.value)}/>
        <button className="add-btn" onClick={submit}>＋ Add</button>
      </div>
    </div>

    {/* stage filter + list/board toggle */}
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,flexWrap:"wrap"}}>
      <div className="seg">{stageFilters.map(([k,l])=><button key={k} className={filter===k?"active":""} onClick={()=>setFilter(k)}>{l}</button>)}</div>
      <div className="viewtog" style={{marginLeft:"auto"}}>
        <button className={vmode==="list"?"active":""} onClick={()=>setVmode("list")}>List</button>
        <button className={vmode==="board"?"active":""} onClick={()=>setVmode("board")}>Board</button>
      </div>
    </div>

    {/* type filter pills */}
    {active.length>0 && <div className="typebar">
      <span className={"type-pill"+(typeF==="all"?" active":"")} onClick={()=>setTypeF("all")}>All types <span className="n">{active.length}</span></span>
      {EDIT_TYPE_KEYS.filter(k=>counts[k]>0).map(k=>(
        <span key={k} className={"type-pill"+(typeF===k?" active":"")} onClick={()=>setTypeF(typeF===k?"all":k)}>
          {EDIT_TYPES[k].emoji} {EDIT_TYPES[k].label} <span className="n">{counts[k]}</span>
        </span>
      ))}
    </div>}

    {vmode==="list" ? (
      <div className="elist">
        {ranked.length?ranked.map(e=>{
          const ty=EDIT_TYPES[e.type]||EDIT_TYPES.other;
          const st=EDIT_STAGES.find(s=>s.k===e.stage)||EDIT_STAGES[0];
          const si=EDIT_STAGES.findIndex(s=>s.k===e.stage);
          const done=e.stage==="delivered";
          return <div key={e.id} className="ecard2" style={done?{opacity:.6}:null}>
            <div className="stripe" style={{background:st.color}}></div>
            <div className="ebody">
              <div className="etop">
                <div className="etitle">{e.title}</div>
                <span className="stage-badge" style={{background:st.color+"22",color:st.color}}>{st.label}</span>
              </div>
              {e.note&&<div className="enote">{e.note}</div>}
              <div className="emeta">
                <span className="type-tag" style={{background:ty.color+"22",color:ty.color}}>{ty.emoji} {ty.label}</span>
                <DueChip deadline={e.deadline}/>
                {(()=>{ const b=bkById[e.bookingId]; if(!b) return null;
                  return vbPaid(b)
                    ? <span className="chip" style={{color:"var(--green)"}} title="Client paid — the edit still has to be delivered">💵 Paid · edit still due</span>
                    : <><span className="chip" style={{color:"var(--orange)"}}>💰 Balance ${vbBalance(b).toLocaleString()}</span><button onClick={()=>{const _ub={...b,depositStatus:'yes'};saveBooking(_ub);}} style={{marginLeft:6,background:'#C9A84C',color:'#0A0A0A',border:'none',borderRadius:4,padding:'2px 8px',fontSize:11,fontWeight:700,cursor:'pointer'}}>✓ Paid</button></>;;
                })()}
              </div>
              <div className="eprog">
                {EDIT_STAGES.map((s,i)=><span key={s.k} className="pd" style={i<=si?{background:st.color}:null}></span>)}
                <span className="plab">Stage {si+1} of {EDIT_STAGES.length}</span>
              </div>
              <div className="eact">
                {si>0 && <span className="ebtn" onClick={()=>moveEdit(e.id,-1)}>◀ Back</span>}
                {si<EDIT_STAGES.length-2 && <span className="ebtn go" onClick={()=>moveEdit(e.id,1)}>Advance ▶</span>}
                {si===EDIT_STAGES.length-2 && <span className="ebtn go" onClick={()=>moveEdit(e.id,1)}>✓ Deliver</span>}
                {done && <span className="ebtn" onClick={()=>moveEdit(e.id,-1)}>Reopen</span>}
                <span className="ebtn del" onClick={()=>delEdit(e.id)}>Remove</span>
              </div>
            </div>
          </div>;
        }):<div className="empty"><div className="e-ico">🎬</div>Nothing here — queue is clear.</div>}
      </div>
    ) : (
      <div className="board">
        {EDIT_STAGES.map(st=>{
          const col=ranked.filter(e=>e.stage===st.k);
          return <div key={st.k} className="bcol">
            <div className="bcol-h"><span className="dot" style={{background:st.color}}></span>{st.label}<span className="cnt">{col.length}</span></div>
            {col.length?col.map(e=>{
              const ty=EDIT_TYPES[e.type]||EDIT_TYPES.other;
              const si=EDIT_STAGES.findIndex(s=>s.k===e.stage);
              return <div key={e.id} className="ecard">
                <div className="et">{e.title}</div>
                {e.note&&<div style={{fontSize:11.5,color:"var(--txt-faint)",marginTop:4,lineHeight:1.4}}>{e.note}</div>}
                <div className="em">
                  <span className="type-tag" style={{background:ty.color+"22",color:ty.color}}>{ty.emoji} {ty.label}</span>
                  <DueChip deadline={e.deadline}/>
                </div>
                <div className="ef">
                  {si>0 && <span className="stepbtn" title="Move back a stage" onClick={()=>moveEdit(e.id,-1)}>◀</span>}
                  {si<EDIT_STAGES.length-1 && <span className="stepbtn go" title="Advance a stage" onClick={()=>moveEdit(e.id,1)}>▶</span>}
                  <span className="stepbtn x" title="Remove" onClick={()=>delEdit(e.id)}>✕</span>
                </div>
              </div>;
            }):<div style={{fontSize:12,color:"var(--txt-faint)",padding:"6px 2px"}}>—</div>}
          </div>;
        })}
      </div>
    )}
  </div>;
}

/* ---------- NEW SMART BOOKING (full VisualBook form, in this app) ---------- */
function BookingModal({data,onClose,onSave,onDelete,onInvoice,clients,bookings=[]}){
  const [b,setB]=useState({...data.booking});
  const [smart,setSmart]=useState("");
  const smartRef=useRef("");
  const [matched,setMatched]=useState("");
  const set=(k,v)=>setB(p=>({...p,[k]:v}));
  const setType=(v)=>setB(p=>({...p,shootType:v,deliverables:deliverablesFor(v)}));
  const bal=vbBalance(b);
  // Start + hours ⇄ end time: fill in any two, the third computes itself.
  const addHrs=(t,h)=>{ const [H,M]=t.split(":").map(Number); const tot=((H*60+M+Math.round(h*60))%1440+1440)%1440; return String(Math.floor(tot/60)).padStart(2,"0")+":"+String(tot%60).padStart(2,"0"); };
  const diffHrs=(a,z)=>{ const [h1,m1]=a.split(":").map(Number),[h2,m2]=z.split(":").map(Number); let d=(h2*60+m2)-(h1*60+m1); if(d<0)d+=1440; return Math.round(d/15)*15/60; };
  const setStart=(v)=>setB(p=>({...p,startTime:v, endTime:(v&&Number(p.hours)>0)?addHrs(v,Number(p.hours)):p.endTime}));
  const setHrs=(v)=>setB(p=>({...p,hours:v, endTime:(p.startTime&&Number(v)>0)?addHrs(p.startTime,Number(v)):p.endTime}));
  const setEnd=(v)=>setB(p=>({...p,endTime:v, hours:(p.startTime&&v)?diffHrs(p.startTime,v):p.hours}));
  // Parse text/voice → fields. If the name matches a client you already have,
  // their saved contact info + id fill in (no duplicate client gets created).
  function applySmartText(txt){
    if(!(txt||"").trim()) return;
    const f=parseSmartBooking(txt);
    // normalize so voice ("Vine and Barrel") matches saved names ("Vine & Barrel")
    const norm=s=>(s||"").toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
    const tN=norm(txt);
    let hit=null;
    if(f.clientName) hit=(clients||[]).find(c=>norm(c.name)===norm(f.clientName));
    if(!hit) hit=(clients||[]).find(c=>{ const n=norm(c.name); return n.length>3&&tN.includes(n); });
    if(hit){
      f.clientId=hit.id; f.clientName=hit.name;
      f.email=f.email||hit.email||""; f.phone=f.phone||hit.phone||"";
      f.instagram=f.instagram||hit.instagram||"";
      setMatched("✓ Matched existing client: "+hit.name);
    } else if(f.clientName){ setMatched("＋ New client will be created: "+f.clientName); }
    setB(p=>({...p,...f}));
  }
  function applySmart(){ applySmartText(smart); }
  return <div className="overlay" onClick={onClose}>
    <div className="modal glass" onClick={e=>e.stopPropagation()}>
      <h3>{data.isNew?"✦ New Smart Booking":"Edit booking"}</h3>
      <div className="mh-sub">Client + shoot + money in one place. Saving queues the edit automatically.</div>
      {data.isNew && <div className="field">
        <label>Smart intake — talk it or paste it, I'll fill the form</label>
        <div style={{display:"flex",gap:8}}>
          <input value={smart} onChange={e=>{setSmart(e.target.value); smartRef.current=e.target.value;}} onKeyDown={e=>e.key==="Enter"&&applySmart()}
            placeholder='e.g. "Wedding for Sarah James at Vine & Barrel june 5, 7am for 2 hours, $1500, $500 deposit"' style={{flex:1}}/>
          <MicButton onText={(t)=>{setSmart(t); smartRef.current=t;}} onStop={()=>applySmartText(smartRef.current)}/>
          <button className="btn" onClick={applySmart}>Fill</button>
        </div>
        {matched && <div style={{marginTop:8,fontSize:12.5,fontWeight:700,color:matched.startsWith("✓")?"var(--green)":"var(--gold)"}}>{matched}</div>}
      </div>}

function Quotes({quotes,setQuotes}){

  function del(id){ if(window.confirm("Delete this quote?")) setQuotes(p=>p.filter(q=>q.id!==id)); }
  function save(q){ setQuotes(p=>p.some(x=>x.id===q.id)?p.map(x=>x.id===q.id?q:x):[q,...p]); setEditing(null); }
  const setItem=(i,k,v)=>setEditing(p=>({...p,items:p.items.map((it,idx)=>idx===i?{...it,[k]:v}:it)}));
  return <div>
    <button className="btn primary" style={{width:"100%",padding:"14px",fontSize:15,marginBottom:14}} onClick={()=>setEditing(emptyQuote())}>＋ New Quote</button>
    {quotes.length?<div className="elist">{quotes.map(q=>(
      <div key={q.id} className="ecard2" style={{cursor:"pointer"}} onClick={()=>setEditing({...q})}>
        <div className="stripe" style={{background:"var(--gold)"}}></div>
        <div className="ebody">
          <div className="etop">
            <div style={{minWidth:0}}>
              <div className="etitle">{q.client||"Untitled quote"}</div>
              <div className="enote">{q.shootType||"—"} · {(q.items||[]).length} item{(q.items||[]).length===1?"":"s"}</div>
            </div>
            <div style={{fontSize:15,fontWeight:800,color:"var(--gold)"}}>{vbMoney(quoteTotal(q))}</div>
          </div>
          <div className="emeta" onClick={e=>e.stopPropagation()}>
            <a className="chip" style={{color:"var(--gold)",textDecoration:"none",cursor:"pointer"}}
               href={"mailto:?subject="+encodeURIComponent("Quote from KWelchVisuals")+"&body="+encodeURIComponent(quoteEmailBody(q))}>📧 Email quote</a>
            <span className="chip" style={{color:"var(--red)",cursor:"pointer"}} onClick={()=>del(q.id)}>Delete</span>
          </div>
        </div>
      </div>
    ))}</div>:<div className="empty"><div className="e-ico">❖</div>No quotes yet — tap <b>＋ New Quote</b> to price a job.</div>}
    {editing && <div className="overlay" onClick={()=>setEditing(null)}>
      <div className="modal glass" onClick={e=>e.stopPropagation()}>
        <h3>{quotes.some(x=>x.id===editing.id)?"Edit quote":"＋ New Quote"}</h3>

        <div className="field"><label>Shoot type</label>
          <select value={editing.shootType} onChange={e=>{ const items=deliverablesFor(e.target.value).map(d=>({label:d,amount:0})); setEditing({...editing,shootType:e.target.value,items:items.length?items:editing.items}); }}>
            <option value="">Select…</option>{SHOOT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
          </select></div>
        <div className="field"><label>Line items <span style={{color:"var(--gold)",cursor:"pointer",float:"right"}} onClick={()=>setEditing({...editing,items:[...editing.items,{label:"",amount:0}]})}>＋ Line</span></label>
          {editing.items.map((it,i)=>(
            <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
              <input placeholder="Item" value={it.label} onChange={e=>setItem(i,"label",e.target.value)} style={{flex:2}}/>
              <input placeholder="$" type="number" value={it.amount||""} onChange={e=>setItem(i,"amount",Number(e.target.value)||0)} style={{flex:1}}/>
              <button className="btn" style={{padding:"6px 12px"}} onClick={()=>setEditing({...editing,items:editing.items.filter((_,idx)=>idx!==i)})}>✕</button>
            </div>))}
          <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,padding:"12px 14px",borderRadius:10,background:"var(--panel-2)",border:"1px solid var(--border)"}}>
            <span>Total</span><span style={{color:"var(--gold)"}}>{vbMoney(quoteTotal(editing))}</span></div>

          <button className="btn" onClick={()=>setEditing(null)}>Cancel</button>

    </div>}
  </div>;

/* ---------- INVOICES (ported from VisualBook) ---------- */
function Invoices({invoices,openInvoice}){
  const [payInfo,setPayInfo]=useState(loadPayInfo());
  const outstanding=invoices.reduce((s,i)=>s+(i.status!=="paid"?(Number(i.balanceDue)||0):0),0);
  const collected=invoices.reduce((s,i)=>s+(Number(i.amountPaid)||0),0);
  const fmtK=n=>n>=1000?"$"+(n/1000).toFixed(n%1000?1:0)+"k":"$"+Math.round(n);
  const BADGE={paid:["PAID","var(--green)"],partial:["PARTIAL","var(--gold)"],unpaid:["DUE","var(--red)"]};
  return <div>
    <div className="estrip">
      <div className="estat"><span className="edge" style={{background:"var(--gold)"}}></span><div className="l">Invoices</div><div className="v">{invoices.length}</div></div>
      <div className={"estat"+(outstanding>0?" warn":"")}><span className="edge" style={{background:outstanding>0?"var(--red)":"var(--border)"}}></span><div className="l">Outstanding</div><div className="v">{fmtK(outstanding)}</div></div>
      <div className="estat good"><span className="edge" style={{background:"var(--green)"}}></span><div className="l">Collected</div><div className="v">{fmtK(collected)}</div></div>
    </div>
    <div className="field" style={{marginBottom:14}}>
      <label>Your payment details (shown on invoices with a balance — Zelle / Venmo / check info)</label>
      <input value={payInfo} onChange={e=>{setPayInfo(e.target.value); savePayInfo(e.target.value);}} placeholder="e.g. Zelle: 707-XXX-XXXX · Venmo: @kwelchvisuals"/>
    </div>
    {invoices.length?<div className="elist">{invoices.map(inv=>{
      const [lbl,col]=BADGE[inv.status]||BADGE.unpaid;
      return <div key={inv.id} className="ecard2" style={{cursor:"pointer"}} onClick={()=>openInvoice(inv)}>
        <div className="stripe" style={{background:col}}></div>
        <div className="ebody">
          <div className="etop">
            <div style={{minWidth:0}}>
              <div className="etitle">{inv.clientName}</div>
              <div className="enote">{inv.no} · {inv.shootType||"Production"}{inv.shootDate?` · ${vbFmtDate(inv.shootDate)}`:""}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:15,fontWeight:800}}>{vbMoney(inv.total)}</div>
              <span className="stage-badge" style={{background:col+"22",color:col}}>{lbl}</span>
            </div>
          </div>
          {inv.status!=="paid"&&<div className="emeta"><span className="chip" style={{color:"var(--orange)"}}>Balance {vbMoney(inv.balanceDue)}</span></div>}
        </div>
      </div>;
    })}</div>:<div className="empty"><div className="e-ico">🧾</div>No invoices yet — open a booking and tap <b>🧾 Invoice</b>.</div>}
  </div>;
}

function CallBacks({callbacks,addCall,toggleCall,delCall}){
  const [name,setName]=useState(""),[phone,setPhone]=useState(""),[reason,setReason]=useState(""),[urgent,setUrgent]=useState(false);
  const [showDone,setShowDone]=useState(false);
  const pending=callbacks.filter(c=>!c.done).sort((a,b)=>((b.urgent?1:0)-(a.urgent?1:0))||(a.created-b.created));
  const done=callbacks.filter(c=>c.done);
  const list=showDone?done:pending;
  const submit=()=>{ if(!name.trim())return; addCall({name,phone,reason,urgent}); setName("");setPhone("");setReason("");setUrgent(false); };
  const initials=(n)=>(n.replace(/[^a-zA-Z ]/g,"").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase())||"•";

  return <div>

        <input style={{...INP,flex:"1 1 180px"}} placeholder="Name" value={name} onChange={e=>setName(e.target.value)}/>

      </div>

        <input style={{...INP,flex:"1 1 240px"}} placeholder="Why? (e.g. confirm date, send quote)" value={reason} onChange={e=>setReason(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")submit();}}/>
        <label style={{display:"flex",alignItems:"center",gap:7,fontSize:12.5,color:"var(--txt-dim)",cursor:"pointer",userSelect:"none"}}>
          <input type="checkbox" checked={urgent} onChange={e=>setUrgent(e.target.checked)} style={{accentColor:"var(--red)",width:16,height:16}}/> Urgent
        </label>
        <button className="add-btn" onClick={submit}>＋ Add</button>
      </div>
    </div>

    <div className="seg" style={{marginBottom:14}}>
      <button className={!showDone?"active":""} onClick={()=>setShowDone(false)}>To Call ({pending.length})</button>
      <button className={showDone?"active":""} onClick={()=>setShowDone(true)}>Done ({done.length})</button>
    </div>

    {list.length?list.map(c=>(
      <div key={c.id} className={"cb"+(c.urgent&&!c.done?" urgent":"")+(c.done?" done":"")}>
        <div className="cb-av">{initials(c.name)}</div>
        <div className="cb-b">
          <div className="cb-n">{c.name}{c.phone&&<a className="cb-tel" href={"tel:"+c.phone.replace(/[^0-9+]/g,"")}>{c.phone}</a>}</div>
          {c.reason&&<div className="cb-r">{c.reason}</div>}
        </div>
        <div className="cb-side">
          {c.urgent&&!c.done&&<span className="urgent-flag">Urgent</span>}
          <span className="mini-btn" onClick={()=>toggleCall(c.id)}>{c.done?"Reopen":"Called ✓"}</span>
          <span className="mini-btn" onClick={()=>delCall(c.id)}>Remove</span>
        </div>
      </div>
    )):<div className="empty"><div className="e-ico">{showDone?"📭":"📞"}</div>{showDone?"No completed call-backs yet.":"All caught up — nobody to call back."}</div>}
  </div>;
}
